syntax = "proto3";

package silifuzz.minimizer;

option java_multiple_files = true;
option java_package = "com.google.silifuzz.minimizer";
option java_outer_classname = "ScheduleProto";

// Configuration tuning parameters for minimization passes.
message PassConfig {
  // Caps the number of successful mutations per pass instance (e.g., 1 for
  // *_ONE). If unset or negative, the budget is unconstrained (infinite).
  optional int32 max_successes = 1;
  // Aborts early after N consecutive try_modify failures (legacy THRESHOLD
  // cutoff). If unset or negative, the budget is unconstrained (infinite).
  optional int32 max_consecutive_failures = 2;
  // Caps the number of outer convergence rounds per pass instance.
  // If unset or negative, the budget is unconstrained (infinite).
  optional int32 max_iterations = 3;

  enum CandidateOrder {
    DEFAULT_ORDER = 0;  // Pass-specific optimal default (e.g., RANDOM_ORDER for
                        // NOP, FORWARD_ORDER for OMIT)
    FORWARD_ORDER = 1;  // Explicit top-to-bottom execution order
    REVERSE_ORDER = 2;  // Explicit bottom-to-top execution order
    RANDOM_ORDER = 3;   // Random candidate selection (based on seed)
  }
  // Explicit candidate execution ordering.
  optional CandidateOrder candidate_order = 4;
  // Optional seed for RANDOM_ORDER. If unset, defaults to snapshot ID hash.
  optional int64 seed = 5;
}
